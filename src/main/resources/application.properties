spring.application.name=code-reviewer

# H2 in-memory database configuration
spring.datasource.url=jdbc:h2:mem:codereviewer
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA auto-creates tables from our entities
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Enable H2 web console for debugging
spring.h2-console.enabled=true
spring.h2-console.path=/h2-console

logging.level.org.springframework.web=DEBUG


spring.ai.openai.api-key=${GROQ_API_KEY}
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.3-70b-versatile
spring.ai.openai.chat.options.max-tokens=4096